<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quiz Engine Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0f0c29; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        /* Glassmorphism card */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            margin: 15px;
            padding: 20px;
        }
        .nav-tabs {
            display: flex;
            justify-content: space-around;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .tab {
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }
        .tab.active { background: var(--primary); color: #000; font-weight: bold; }
        
        /* Сетка вопросов */
        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px;
        }
        .q-card {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: 0.2s;
        }
        .q-card:active { transform: scale(0.9); box-shadow: 0 0 15px var(--primary); }
        
        /* Скрытые секции */
        .section { display: none; padding-bottom: 50px; }
        .section.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            outline: none;
        }
        button { background: var(--primary); font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="nav-tabs">
        <div class="tab active" onclick="showTab('play')">🎮 Игра</div>
        <div class="tab" onclick="showTab('create')">🏠 Комната</div>
        <div class="tab" onclick="showTab('packs')">🛠 Паки</div>
    </div>

    <div id="play" class="section active">
        <div class="glass">
            <h3>Вход в комнату</h3>
            <input type="number" id="roomCode" placeholder="Код 5 знаков">
            <button onclick="joinRoom()">Войти в игру</button>
        </div>
        <div id="gameArea" style="display:none">
            <div class="glass quiz-grid" id="grid"></div>
        </div>
    </div>

    <div id="create" class="section">
        <div class="glass">
            <h3>Создать новую игру</h3>
            <div id="packList">Загрузка паков...</div>
            <button onclick="createRoom()">Запустить комнату</button>
        </div>
    </div>

    <div id="packs" class="section">
        <div class="glass">
            <h3>Конструктор пака</h3>
            <input type="text" id="packName" placeholder="Название пака">
            <div id="editor">
                </div>
            <button onclick="savePack()">💾 Сохранить пак</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function showTab(tabId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function joinRoom() {
            const code = document.getElementById('roomCode').value;
            // Отправляем данные боту
            tg.sendData(JSON.stringify({ action: "join", code: code }));
        }

        // Логика выбора вопроса
        function selectQuestion(cat, pts) {
            tg.sendData(JSON.stringify({ action: "pick", category: cat, points: pts }));
        }
    </script>
</body>
</html>
