<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quiz Master Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Цветовая палитра: Темный Неон */
        :root {
            --bg: #0b0e14;
            --card: #1a1f26;
            --accent: #00f2ff;
            --text: #ffffff;
            --gray: #8a8f98;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Навигация сверху */
        .nav {
            display: flex;
            padding: 10px;
            gap: 10px;
            background: var(--card);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: var(--gray);
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-btn.active {
            background: var(--accent);
            color: #000;
        }

        /* Контентные блоки */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        /* Поля ввода */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #252b33;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Стили конструктора */
        .cat-block {
            border-left: 3px solid var(--accent);
            padding-left: 15px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="nav">
        <button class="nav-btn active" onclick="showScreen('play', this)">ИГРАТЬ</button>
        <button class="nav-btn" onclick="showScreen('create', this)">КОМНАТА</button>
        <button class="nav-btn" onclick="showScreen('builder', this)">ПАКИ</button>
    </div>

    <div class="content">
        <div id="screen-play" class="screen active">
            <div class="card">
                <h3>Вход в сессию</h3>
                <input type="number" id="join-code" placeholder="Код комнаты (5 цифр)">
                <button class="btn-main" onclick="onJoin()">ВОЙТИ</button>
            </div>
        </div>

        <div id="screen-create" class="screen">
            <div class="card">
                <h3>Запустить игру</h3>
                <p>Выберите пак для этой комнаты:</p>
                <div id="packs-list">
                    <p style="color:var(--gray)">Загрузка списка паков...</p>
                </div>
            </div>
        </div>

        <div id="screen-builder" class="screen">
            <div class="card">
                <h3>Создание нового пака</h3>
                <input type="text" id="pack-name-input" placeholder="Название пака">
                
                <div id="constructor-area"></div>

                <button onclick="addCategory()" style="background:none; color:var(--accent); border:1px solid var(--accent); padding:10px; width:100%; border-radius:8px; cursor:pointer;">
                    + Добавить категорию
                </button>

                <button class="btn-main" onclick="savePack()">💾 СОХРАНИТЬ ПАК</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let packData = { name: "", categories: [] };

        function showScreen(id, btn) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            btn.classList.add('active');
        }

        // Логика добавления данных в конструктор
        function addCategory() {
            const catId = packData.categories.length;
            packData.categories.push({ name: "", questions: [] });
            
            const div = document.createElement('div');
            div.className = 'cat-block';
            div.innerHTML = `
                <input type="text" placeholder="Имя категории" oninput="packData.categories[${catId}].name = this.value">
                <div id="q-container-${catId}"></div>
                <button onclick="addQuestion(${catId})" style="font-size:12px; margin-bottom:10px;">+ Вопрос</button>
            `;
            document.getElementById('constructor-area').appendChild(div);
        }

        function addQuestion(catId) {
            const qId = packData.categories[catId].questions.length;
            packData.categories[catId].questions.push({ text: "", points: 100, answer: "" });
            
            const qDiv = document.createElement('div');
            qDiv.innerHTML = `
                <div style="display:flex; gap:5px;">
                    <input type="number" placeholder="Баллы" style="width:70px" oninput="packData.categories[${catId}].questions[${qId}].points = this.value">
                    <input type="text" placeholder="Вопрос" oninput="packData.categories[${catId}].questions[${qId}].text = this.value">
                </div>
            `;
            document.getElementById('q-container-' + catId).appendChild(qDiv);
        }

        // КРИТИЧЕСКИЕ ФУНКЦИИ ОТПРАВКИ
        function onJoin() {
            const code = document.getElementById('join-code').value;
            if(!code) return tg.showAlert("Введите код!");
            tg.sendData(JSON.stringify({ action: "join_room", code: code }));
        }

        function savePack() {
            packData.name = document.getElementById('pack-name-input').value;
            if(!packData.name) return tg.showAlert("Введите название пака!");
            
            // Отправляем весь объект боту
            tg.sendData(JSON.stringify({
                action: "create_pack",
                data: packData
            }));
        }
    </script>
</body>
</html>
