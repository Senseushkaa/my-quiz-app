<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quiz Master Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent: #00d2ff;
            --bg: #0f0c29;
            --glass: rgba(255, 255, 255, 0.07);
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,210,255,0.1), transparent);
        }
        .header h1 { margin: 0; font-size: 22px; letter-spacing: 1px; color: var(--accent); }

        .tabs {
            display: flex;
            background: rgba(0,0,0,0.3);
            padding: 5px;
            margin: 0 15px;
            border-radius: 12px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            border-radius: 8px;
            transition: 0.3s;
            cursor: pointer;
        }
        .tab.active { background: var(--accent); color: #000; font-weight: bold; }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .view { display: none; }
        .view.active { display: block; animation: slideUp 0.4s ease; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
        }
        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: white;
            margin-bottom: 15px;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: #000;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,210,255,0.3);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header"><h1>QUIZ MASTER</h1></div>

    <div class="tabs">
        <div class="tab active" onclick="switchView('play', this)">ИГРАТЬ</div>
        <div class="tab" onclick="switchView('create', this)">КОМНАТА</div>
        <div class="tab" onclick="switchView('packs', this)">ПАКИ</div>
    </div>

    <div class="content">
        <div id="view-play" class="view active">
            <div class="card">
                <h3>Вход в игру</h3>
                <p style="font-size: 12px; opacity: 0.6;">Введите код комнаты, полученный от ведущего</p>
                <input type="number" id="room-code" placeholder="00000">
                <button class="btn" onclick="send('join')">ВОЙТИ</button>
            </div>
        </div>

        <div id="view-create" class="view">
            <div class="card">
                <h3>Создать комнату</h3>
                <p style="font-size: 12px; opacity: 0.6;">Выберите пак, чтобы стать ведущим</p>
                <div id="packs-container">
                    <button class="btn btn-outline" onclick="send('create_room')">ВЫБРАТЬ ПАК</button>
                </div>
            </div>
        </div>

        <div id="view-packs" class="view">
            <div class="card">
                <h3>Конструктор</h3>
                <button class="btn" onclick="send('new_pack')">СОЗДАТЬ НОВЫЙ ПАК</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function switchView(viewId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            el.classList.add('active');
        }

        function send(action) {
            const code = document.getElementById('room-code').value;
            tg.sendData(JSON.stringify({
                action: action,
                room_code: code
            }));
        }
    </script>
</body>
</html>
