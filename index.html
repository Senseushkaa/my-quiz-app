<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quiz Master Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00d2ff;
            --bg: #0f0c29;
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        .header {
            padding: 15px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,210,255,0.15), transparent);
            border-bottom: 1px solid var(--border);
        }
        .header h1 { margin: 0; font-size: 20px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }

        /* Navigation */
        .tabs {
            display: flex;
            background: rgba(0,0,0,0.4);
            padding: 5px;
            margin: 10px 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            border-radius: 8px;
            transition: 0.3s;
            cursor: pointer;
            color: rgba(255,255,255,0.6);
        }
        .tab.active { background: var(--accent); color: #000; font-weight: 700; }

        /* Content Area */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 40px;
        }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Cards & UI */
        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
        }
        h3 { margin-top: 0; font-size: 18px; color: var(--accent); }

        input, select {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: #000;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); margin-top: 10px; }

        /* Constructor Styles */
        .q-item {
            background: rgba(255,255,255,0.03);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 3px solid var(--accent);
        }
    </style>
</head>
<body>

    <div class="header"><h1>QUIZ MASTER</h1></div>

    <div class="tabs" id="main-nav">
        <div class="tab active" onclick="switchView('play', this)">ИГРАТЬ</div>
        <div class="tab" onclick="switchView('create', this)">КОМНАТА</div>
        <div class="tab" onclick="switchView('packs', this)">ПАКИ</div>
    </div>

    <div class="content">
        <div id="view-play" class="view active">
            <div class="card">
                <h3>Войти в игру</h3>
                <input type="number" id="join-code" placeholder="Код комнаты (5 цифр)">
                <button class="btn" onclick="sendJoin()">ПРИСОЕДИНИТЬСЯ</button>
            </div>
        </div>

        <div id="view-create" class="view">
            <div class="card">
                <h3>Создать комнату</h3>
                <p style="font-size: 13px; opacity: 0.7;">Выберите пак из списка созданных вами:</p>
                <div id="packs-list">
                    <button class="btn btn-outline" onclick="tg.showAlert('Тут будет список паков из базы')">ОБНОВИТЬ СПИСОК</button>
                </div>
            </div>
        </div>

        <div id="view-packs" class="view">
            <div id="pack-home">
                <div class="card">
                    <h3>Ваши паки</h3>
                    <button class="btn" onclick="openConstructor()">➕ СОЗДАТЬ НОВЫЙ ПАК</button>
                </div>
            </div>

            <div id="pack-editor" style="display:none;">
                <div class="card">
                    <h3 id="edit-title">Новый пак</h3>
                    <input type="text" id="pack-name" placeholder="Название (например: Киноман)">

                    <div id="categories-container">
                        </div>

                    <button class="btn btn-outline" onclick="addCategory()">+ ДОБАВИТЬ КАТЕГОРИЮ</button>
                    <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
                    <button class="btn" onclick="saveFullPack()">💾 СОХРАНИТЬ ВЕСЬ ПАК</button>
                    <button class="btn btn-outline" style="border-color: #ff4b2b; color: #ff4b2b;" onclick="closeConstructor()">ОТМЕНА</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentPack = { name: "", categories: [] };

        function switchView(viewId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            if(el) el.classList.add('active');

            // Если выходим из конструктора, сбрасываем его
            if(viewId !== 'packs') closeConstructor();
        }

        // Логика Конструктора
        function openConstructor() {
            document.getElementById('pack-home').style.display = 'none';
            document.getElementById('pack-editor').style.display = 'block';
            document.getElementById('main-nav').style.display = 'none'; // Скрываем навигацию
            currentPack = { name: "", categories: [] };
            addCategory(); // Сразу одну категорию
        }

        function closeConstructor() {
            document.getElementById('pack-home').style.display = 'block';
            document.getElementById('pack-editor').style.display = 'none';
            document.getElementById('main-nav').style.display = 'flex';
        }

        function addCategory() {
            const catId = currentPack.categories.length;
            currentPack.categories.push({ name: "", questions: [] });

            const catHtml = `
                <div class="card" style="background: rgba(255,255,255,0.02); padding: 15px; margin-top: 10px;" id="cat-${catId}">
                    <input type="text" placeholder="Название категории" onchange="updateCatName(${catId}, this.value)">
                    <div id="q-list-${catId}"></div>
                    <button class="btn btn-outline" style="font-size: 11px; padding: 8px;" onclick="addQuestion(${catId})">+ Вопрос</button>
                </div>
            `;
            document.getElementById('categories-container').insertAdjacentHTML('beforeend', catHtml);
        }

        function updateCatName(id, val) { currentPack.categories[id].name = val; }

        function addQuestion(catId) {
            const qId = currentPack.categories[catId].questions.length;
            currentPack.categories[catId].questions.push({ text: "", pts: 100, ans: "" });

            const qHtml = `
                <div class="q-item" id="q-${catId}-${qId}">
                    <input type="number" placeholder="Баллы" style="width: 80px;" onchange="currentPack.categories[${catId}].questions[${qId}].pts = this.value">
                    <input type="text" placeholder="Вопрос" onchange="currentPack.categories[${catId}].questions[${qId}].text = this.value">
                    <input type="text" placeholder="Ответ" style="margin-bottom:0;" onchange="currentPack.categories[${catId}].questions[${qId}].ans = this.value">
                </div>
            `;
            document.getElementById(`q-list-${catId}`).insertAdjacentHTML('beforeend', qHtml);
        }

        // Финальная отправка боту
        function saveFullPack() {
            currentPack.name = document.getElementById('pack-name').value;
            if(!currentPack.name) return tg.showAlert("Введите название пака!");

            tg.sendData(JSON.stringify({
                action: "save_full_pack",
                payload: currentPack
            }));
        }

        function sendJoin() {
            const code = document.getElementById('join-code').value;
            if(!code) return;
            tg.sendData(JSON.stringify({
                action: "join",
                room_code: code
            }));
        }
    </script>
</body>
</html>
